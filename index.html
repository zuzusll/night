<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Любимой Ангелине</title>
    <link rel="shortcut icon" href="d:\ночь\photo_2026-03-09_16-09-12.ico" type="image/x-icon">
    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: #ffb7c5; /* Нежно-розовый цвет */
        }

        .scene {
            position: relative;
            width: 400px;
            height: 400px;
        }

        .heart {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: move-and-swirl 10s ease-in-out infinite;
        }

        .text-line {
            position: absolute;
            white-space: nowrap;
            animation: pulse 2s linear infinite;
            filter: blur(0.5px);
        }

        /* Glitch эффект: цветовая аберрация */
        .text-line::before,
        .text-line::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }

        .text-line::before {
            left: 2px;
            text-shadow: -1px 0 #ff00f2; /* Пурпурный сдвиг */
            animation: glitch-1 3s infinite linear alternate-reverse;
        }

        .text-line::after {
            left: -2px;
            text-shadow: -1px 0 #00ffff; /* Циановый сдвиг */
            animation: glitch-2 3s infinite linear alternate-reverse;
        }

        @keyframes move-and-swirl {
            0%, 100% { transform: scale(1) translate(0, 0) rotate(0deg); }
            25% { transform: scale(1.05) translate(20px, -20px) rotate(3deg); }
            50% { transform: scale(0.95) translate(-15px, 15px) rotate(-2deg); }
            75% { transform: scale(1.02) translate(10px, 25px) rotate(1deg); }
        }

        @keyframes glitch-1 {
            0%, 100% { clip-path: inset(80% 0 1% 0); }
            20% { clip-path: inset(20% 0 60% 0); }
            40% { clip-path: inset(50% 0 30% 0); }
            60% { clip-path: inset(10% 0 70% 0); }
            80% { clip-path: inset(90% 0 2% 0); }
        }

        @keyframes glitch-2 {
            0%, 100% { clip-path: inset(1% 0 80% 0); }
            20% { clip-path: inset(60% 0 20% 0); }
            40% { clip-path: inset(30% 0 50% 0); }
            60% { clip-path: inset(70% 0 10% 0); }
            80% { clip-path: inset(2% 0 90% 0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; text-shadow: 0 0 5px rgba(255, 183, 197, 0.4); }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="heart" id="heartContainer"></div>
    </div>

    <script>
        const heartContainer = document.getElementById('heartContainer');
        const numLines = 60; // Количество строк для плавности формы
        const phrase = "I love you ";
        const fontSize = 14;

        for (let i = 0; i < numLines; i++) {
            // Параметрическое уравнение сердца
            // t в диапазоне от 0 до 2*PI
            const t = (i / numLines) * 2 * Math.PI;
            
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

            const line = document.createElement('div');
            line.className = 'text-line';
            line.textContent = phrase.repeat(1); // Короткая фраза для каждой строки
            line.setAttribute('data-text', line.textContent);
            line.style.fontSize = `${fontSize}px`;

            // Масштабирование координат и центрирование
            const scaleFactor = 10;
            const posX = x * scaleFactor + 200; // Центр 200px
            const posY = y * scaleFactor + 200; 

            line.style.left = `${posX}px`;
            line.style.top = `${posY}px`;

            // Угол наклона текста для следования по кривой
            const angleDeg = Math.atan2(y, x) * (180 / Math.PI) + 90;
            // Для нижней части сердца вращение нужно скорректировать
            line.style.transform = `translate(-50%, -50%) rotate(${angleDeg}deg)`;

            heartContainer.appendChild(line);
        }
    </script>
</body>
</html>
